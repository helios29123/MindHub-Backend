openapi: 3.0.3
info:
  title: MindHub REST API Documentation
  description: >-
    Trang tài liệu API tích hợp hệ thống xác thực, quản lý học tập, và khóa học MindHub.
    Cung cấp đầy đủ mô tả chi tiết đầu vào/đầu ra, mã lỗi HTTP và chức năng thử nghiệm API trực tiếp.
  version: 1.0.0
servers:
  - url: http://localhost/api
    description: Local Laragon Server
  - url: http://localhost:8000/api
    description: Local PHP Development Server
paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Đăng ký tài khoản mới (Learner)
      description: Tạo mới tài khoản học viên và gửi link xác thực qua Email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - full_name
                - email
                - password
                - password_confirmation
              properties:
                full_name:
                  type: string
                  maxLength: 255
                  example: Nguyễn Văn A
                email:
                  type: string
                  format: email
                  maxLength: 255
                  example: learner1@mindhub.test
                phone:
                  type: string
                  maxLength: 30
                  example: "0987654321"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "12345678"
                password_confirmation:
                  type: string
                  format: password
                  example: "12345678"
      responses:
        '201':
          description: Đăng ký thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đăng ký tài khoản thành công. Vui lòng xác thực email.
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 10
                          full_name:
                            type: string
                            example: Nguyễn Văn A
                          email:
                            type: string
                            example: learner1@mindhub.test
                          role:
                            type: string
                            example: learner
                          status:
                            type: string
                            example: active
                      verify_url:
                        type: string
                        nullable: true
                        example: "http://localhost/api/auth/verify-email/10/sha1_hash"
        '409':
          description: Email đã được sử dụng.
        '422':
          description: Dữ liệu không hợp lệ.

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Đăng nhập bằng Email/Password
      description: Xác thực người dùng và khởi tạo phiên đăng nhập (session). Trả về Access Token (JWT) và Refresh Token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: learner1@mindhub.test
                password:
                  type: string
                  format: password
                  example: "12345678"
                device_name:
                  type: string
                  maxLength: 255
                  example: Chrome_Windows
      responses:
        '200':
          description: Đăng nhập thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đăng nhập thành công.
                  data:
                    type: object
                    properties:
                      token_type:
                        type: string
                        example: Bearer
                      access_token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refresh_token:
                        type: string
                        example: "plain_text_refresh_token_string"
                      expires_in:
                        type: integer
                        example: 3600
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 4
                          full_name:
                            type: string
                            example: Learner One
                          email:
                            type: string
                            example: learner1@mindhub.test
                          role:
                            type: string
                            example: learner
        '401':
          description: Sai thông tin đăng nhập.
        '403':
          description: Tài khoản bị khóa (locked) hoặc chưa kích hoạt (inactive).
        '422':
          description: Dữ liệu không hợp lệ.

  /auth/google:
    post:
      tags:
        - Authentication
      summary: Đăng nhập bằng tài khoản Google (OAuth2)
      description: Đăng nhập hoặc tạo mới tài khoản tự động bằng Google ID Token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - google_token
              properties:
                google_token:
                  type: string
                  description: Google ID Token thô hoặc chuỗi bắt đầu bằng `mock_` kèm base64 JSON trong môi trường phát triển.
                  example: mock_eyJwcm92aWRlcl9pZCI6IjEyMzQ1NiIsImVtYWlsIjoib2F1dGgubGVhcm5lckBtaW5kaHViLnRlc3QiLCJmdWxsX25hbWUiOiJPYXV0aCBMZWFybmVyIn0=
                device_name:
                  type: string
                  maxLength: 255
                  example: Android_Phone
      responses:
        '200':
          description: Đăng nhập Google thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đăng nhập Google thành công.
                  data:
                    type: object
                    properties:
                      token_type:
                        type: string
                        example: Bearer
                      access_token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refresh_token:
                        type: string
                        example: "plain_text_refresh_token_string"
                      expires_in:
                        type: integer
                        example: 3600
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 9
                          full_name:
                            type: string
                            example: Oauth Learner
                          email:
                            type: string
                            example: oauth.learner@mindhub.test
                          role:
                            type: string
                            example: learner
        '401':
          description: Google token không hợp lệ.
        '403':
          description: Tài khoản Google liên kết bị chặn đăng nhập.
        '422':
          description: Dữ liệu không hợp lệ.

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Yêu cầu đặt lại mật khẩu
      description: Gửi link reset password tới Email. Trong chế độ debug, reset token sẽ được ghi lại trong file log `storage/logs/laravel.log`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: learner1@mindhub.test
      responses:
        '200':
          description: Yêu cầu thành công (luôn trả về 200 vì lý do bảo mật để tránh lộ email tồn tại).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Nếu email tồn tại, hướng dẫn đặt lại mật khẩu đã được gửi.
                  data:
                    type: object
                    properties:
                      reset_token:
                        type: string
                        nullable: true
                        example: null
                      expires_at:
                        type: string
                        format: date-time
                        example: "2026-06-12T14:45:00.000000Z"
        '422':
          description: Định dạng Email không hợp lệ.

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Thực hiện đặt lại mật khẩu
      description: Dùng email, token reset và mật khẩu mới để đặt lại mật khẩu của tài khoản.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - token
                - password
                - password_confirmation
              properties:
                email:
                  type: string
                  format: email
                  example: learner1@mindhub.test
                token:
                  type: string
                  description: Token lấy được từ email hoặc laravel.log
                  example: "64_character_random_reset_token"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "newpassword123"
                password_confirmation:
                  type: string
                  format: password
                  example: "newpassword123"
      responses:
        '200':
          description: Đặt lại mật khẩu thành công. Tất cả các phiên hoạt động cũ của user sẽ bị hủy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đặt lại mật khẩu thành công.
                  data:
                    type: object
                    nullable: true
                    example: null
        '400':
          description: Token không hợp lệ hoặc đã hết hạn.
        '422':
          description: Dữ liệu không hợp lệ.

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Đăng xuất tài khoản
      description: Hủy bỏ phiên hoạt động đăng nhập hiện tại lưu trong cơ sở dữ liệu.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Đăng xuất thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đăng xuất thành công.
                  data:
                    type: array
                    example: []
        '401':
          description: Chưa đăng nhập hoặc Token phiên hết hạn.

  /auth/verify-email/{id}/{hash}:
    get:
      tags:
        - Authentication
      summary: Xác thực email tài khoản
      description: Được gọi khi người dùng click vào link gửi trong email kích hoạt. Link này có chứa chữ ký bảo mật của Laravel.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 10
        - name: hash
          in: path
          required: true
          schema:
            type: string
          example: "sha1_hash_of_email"
        - name: expires
          in: query
          required: true
          schema:
            type: integer
          description: Thời gian hết hạn của link
          example: 1774843932
        - name: signature
          in: query
          required: true
          schema:
            type: string
          description: Chữ ký số của Laravel
          example: "abcdef1234567890..."
      responses:
        '200':
          description: Xác thực email thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Xác thực email thành công.
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 10
                          full_name:
                            type: string
                            example: Nguyễn Văn A
                          email:
                            type: string
                            example: learner1@mindhub.test
                          role:
                            type: string
                            example: learner
        '403':
          description: Link xác thực không hợp lệ hoặc hết hạn.
        '404':
          description: Không tìm thấy người dùng.

  /auth/verify-email/resend:
    post:
      tags:
        - Authentication
      summary: Gửi lại link xác thực email
      description: Tạo và gửi lại link xác thực qua email nếu tài khoản chưa được kích hoạt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: learner1@mindhub.test
      responses:
        '200':
          description: Tạo link gửi thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Nếu email tồn tại và chưa xác thực, link xác thực đã được tạo.
                  data:
                    type: object
                    properties:
                      verify_url:
                        type: string
                        nullable: true
                        example: "http://localhost/api/auth/verify-email/10/sha1_hash"
        '400':
          description: Email đã được xác thực trước đó.
        '422':
          description: Định dạng Email không hợp lệ.

  /users/me:
    get:
      tags:
        - Users Profile
      summary: Xem thông tin cá nhân hiện tại
      description: Lấy thông tin chi tiết của tài khoản đang đăng nhập.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lấy dữ liệu thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Lấy dữ liệu thành công
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 4
                      full_name:
                        type: string
                        example: Learner One
                      email:
                        type: string
                        example: learner1@mindhub.test
                      phone:
                        type: string
                        nullable: true
                        example: null
                      role:
                        type: string
                        example: learner
                      status:
                        type: string
                        example: active
        '401':
          description: Chưa đăng nhập hoặc Token phiên hết hạn.
    patch:
      tags:
        - Users Profile
      summary: Cập nhật thông tin cá nhân hiện tại
      description: Cập nhật các thông tin được hỗ trợ như họ tên (full_name) và số điện thoại (phone).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                  maxLength: 255
                  example: Nguyễn Văn B
                phone:
                  type: string
                  maxLength: 20
                  nullable: true
                  example: "0912345678"
      responses:
        '200':
          description: Thao tác thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Thao tác thành công
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 4
                      full_name:
                        type: string
                        example: Nguyễn Văn B
                      email:
                        type: string
                        example: learner1@mindhub.test
                      phone:
                        type: string
                        example: "0912345678"
                      role:
                        type: string
                        example: learner
                      status:
                        type: string
                        example: active
        '401':
          description: Chưa đăng nhập hoặc Token phiên hết hạn.
        '422':
          description: Dữ liệu không hợp lệ hoặc chứa trường không được hỗ trợ.

  /users/me/password:
    patch:
      tags:
        - Users Profile
      summary: Thay đổi mật khẩu tài khoản
      description: Cập nhật mật khẩu mới cho tài khoản. Yêu cầu nhập đúng mật khẩu hiện tại và mật khẩu mới phải khác mật khẩu cũ.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - password
                - password_confirmation
              properties:
                current_password:
                  type: string
                  format: password
                  example: "12345678"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "newpassword123"
                password_confirmation:
                  type: string
                  format: password
                  example: "newpassword123"
      responses:
        '200':
          description: Đổi mật khẩu thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đổi mật khẩu thành công.
                  data:
                    type: array
                    example: []
        '400':
          description: Yêu cầu không hợp lệ hoặc mật khẩu cũ không đúng.
        '401':
          description: Chưa đăng nhập hoặc Token phiên hết hạn.
        '422':
          description: Dữ liệu đầu vào không hợp lệ.

  /admin/course-reviews:
    get:
      tags:
        - Admin Moderation
      summary: Lấy danh sách khóa học chờ duyệt
      description: Admin xem danh sách các khóa học đang trong trạng thái chờ phê duyệt để tiến hành kiểm duyệt.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          example: 15
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          example: Laravel
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, title_asc, title_desc]
          example: newest
      responses:
        '200':
          description: Lấy dữ liệu thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Lấy dữ liệu thành công
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        instructor_id:
                          type: integer
                          example: 2
                        title:
                          type: string
                          example: Khóa học Laravel nâng cao
                        slug:
                          type: string
                          example: khoa-hoc-laravel-nang-cao
                        short_description:
                          type: string
                          example: Mô tả ngắn của khóa học.
                        status:
                          type: string
                          example: pending
                        price:
                          type: number
                          example: 500000
                        sale_price:
                          type: number
                          nullable: true
                          example: 399000
                        level:
                          type: string
                          example: intermediate
                        language:
                          type: string
                          example: vi
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 15
                      total:
                        type: integer
                        example: 1
        '401':
          description: Chưa đăng nhập hoặc Token phiên hết hạn.
        '403':
          description: Bạn không có quyền thực hiện thao tác này (yêu cầu role admin).

  /admin/courses/{id}/approve:
    patch:
      tags:
        - Admin Moderation
      summary: Phê duyệt khóa học
      description: Phê duyệt khóa học đang chờ duyệt để xuất bản công khai.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        '200':
          description: Thao tác thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Thao tác thành công
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      title:
                        type: string
                        example: Khóa học Laravel nâng cao
                      status:
                        type: string
                        example: published
        '400':
          description: Trạng thái khóa học không hợp lệ để xử lý.
        '401':
          description: Chưa đăng nhập.
        '403':
          description: Không có quyền truy cập.
        '404':
          description: Không tìm thấy dữ liệu.

  /admin/courses/{id}/reject:
    patch:
      tags:
        - Admin Moderation
      summary: Từ chối khóa học
      description: Từ chối xuất bản khóa học kèm theo lý do từ chối.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - admin_reject_reason
              properties:
                admin_reject_reason:
                  type: string
                  maxLength: 1000
                  example: Nội dung khóa học không đạt yêu cầu chất lượng.
      responses:
        '200':
          description: Thao tác thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Thao tác thành công
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      title:
                        type: string
                        example: Khóa học Laravel nâng cao
                      status:
                        type: string
                        example: rejected
                      admin_reject_reason:
                        type: string
                        example: Nội dung khóa học không đạt yêu cầu chất lượng.
        '400':
          description: Trạng thái khóa học không hợp lệ để xử lý.
        '401':
          description: Chưa đăng nhập.
        '403':
          description: Không có quyền truy cập.
        '404':
          description: Không tìm thấy dữ liệu.
        '422':
          description: Lý do từ chối bắt buộc hoặc quá dài.

  /admin/moderation/items/{id}:
    patch:
      tags:
        - Admin Moderation
