<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindHub API Documentation</title>
    <!-- Google Fonts Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Swagger UI CSS -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    
    <!-- Custom Premium Light Mode Styles -->
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #10b981;
            --info-color: #3b82f6;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        body {
            background-color: var(--bg-primary) !important;
            font-family: 'Inter', sans-serif !important;
            margin: 0;
            color: var(--text-primary);
        }

        /* Glassmorphic Navbar Header */
        .api-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .api-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #4f46e5 0%, #1e1b4b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .api-header .badge {
            background-color: rgba(79, 70, 229, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Override Swagger UI Styles for Modern Light Theme */
        .swagger-ui {
            background-color: var(--bg-primary) !important;
            font-family: 'Inter', sans-serif !important;
        }

        /* Text colors */
        .swagger-ui .info .title, 
        .swagger-ui .info h1, 
        .swagger-ui .info h2, 
        .swagger-ui .info h3, 
        .swagger-ui .info h4, 
        .swagger-ui .info h5,
        .swagger-ui h2, 
        .swagger-ui h3,
        .swagger-ui .opblock-tag {
            color: var(--text-primary) !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 700 !important;
        }

        .swagger-ui .info p, 
        .swagger-ui .info li, 
        .swagger-ui .info td, 
        .swagger-ui .info th {
            color: var(--text-secondary) !important;
            font-size: 14px;
        }

        /* Operations blocks container */
        .swagger-ui .opblock {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03) !important;
            margin-bottom: 15px !important;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .swagger-ui .opblock:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -4px rgba(15, 23, 42, 0.05) !important;
        }

        /* Method Badges */
        .swagger-ui .opblock .opblock-summary-method {
            border-radius: 8px !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 700 !important;
            text-shadow: none !important;
            padding: 6px 12px !important;
        }

        /* Colors for different methods */
        .swagger-ui .opblock.opblock-post {
            border-color: rgba(16, 185, 129, 0.2) !important;
            background: rgba(16, 185, 129, 0.02) !important;
        }
        .swagger-ui .opblock.opblock-post .opblock-summary-method {
            background-color: var(--success-color) !important;
            color: #ffffff !important;
        }
        .swagger-ui .opblock.opblock-post .opblock-summary {
            border-bottom-color: rgba(16, 185, 129, 0.1) !important;
        }

        .swagger-ui .opblock.opblock-get {
            border-color: rgba(59, 130, 246, 0.2) !important;
            background: rgba(59, 130, 246, 0.02) !important;
        }
        .swagger-ui .opblock.opblock-get .opblock-summary-method {
            background-color: var(--info-color) !important;
            color: #ffffff !important;
        }
        .swagger-ui .opblock.opblock-get .opblock-summary {
            border-bottom-color: rgba(59, 130, 246, 0.1) !important;
        }

        .swagger-ui .opblock.opblock-patch {
            border-color: rgba(245, 158, 11, 0.2) !important;
            background: rgba(245, 158, 11, 0.02) !important;
        }
        .swagger-ui .opblock.opblock-patch .opblock-summary-method {
            background-color: var(--warning-color) !important;
            color: #ffffff !important;
        }
        .swagger-ui .opblock.opblock-patch .opblock-summary {
            border-bottom-color: rgba(245, 158, 11, 0.1) !important;
        }

        .swagger-ui .opblock.opblock-delete {
            border-color: rgba(239, 68, 68, 0.2) !important;
            background: rgba(239, 68, 68, 0.02) !important;
        }
        .swagger-ui .opblock.opblock-delete .opblock-summary-method {
            background-color: var(--danger-color) !important;
            color: #ffffff !important;
        }
        .swagger-ui .opblock.opblock-delete .opblock-summary {
            border-bottom-color: rgba(239, 68, 68, 0.1) !important;
        }

        .swagger-ui .opblock.opblock-put {
            border-color: rgba(99, 102, 241, 0.2) !important;
            background: rgba(99, 102, 241, 0.02) !important;
        }
        .swagger-ui .opblock.opblock-put .opblock-summary-method {
            background-color: var(--accent-color) !important;
            color: #ffffff !important;
        }
        .swagger-ui .opblock.opblock-put .opblock-summary {
            border-bottom-color: rgba(99, 102, 241, 0.1) !important;
        }

        /* URL path text */
        .swagger-ui .opblock .opblock-summary-path,
        .swagger-ui .opblock .opblock-summary-path__deprecated {
            color: var(--text-primary) !important;
            font-weight: 600 !important;
            font-size: 15px !important;
        }

        .swagger-ui .opblock .opblock-summary-description {
            color: var(--text-secondary) !important;
            font-weight: 500 !important;
        }

        /* Inside operation details */
        .swagger-ui .opblock-body {
            background: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
            padding: 20px !important;
        }

        .swagger-ui .tabli button {
            color: var(--text-secondary) !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
        }

        .swagger-ui .tabli.active button {
            color: var(--accent-color) !important;
        }

        .swagger-ui .opblock-section-header {
            background: var(--bg-tertiary) !important;
            border-bottom: 1px solid var(--border-color) !important;
            border-radius: 8px !important;
            padding: 10px 15px !important;
        }

        .swagger-ui .opblock-section-header h4 {
            color: var(--text-primary) !important;
            font-weight: 600 !important;
        }

        /* Tables & Inputs */
        .swagger-ui table thead tr td, 
        .swagger-ui table thead tr th {
            color: var(--text-primary) !important;
            border-bottom: 2px solid var(--border-color) !important;
            font-weight: 600 !important;
        }

        .swagger-ui table tbody tr td {
            color: var(--text-secondary) !important;
            border-bottom: 1px solid var(--border-color) !important;
        }

        .swagger-ui .parameter__name {
            color: var(--text-primary) !important;
            font-weight: 600 !important;
        }

        .swagger-ui .parameter__type {
            color: var(--text-muted) !important;
        }

        .swagger-ui .parameter__in {
            color: var(--text-muted) !important;
            font-style: italic !important;
        }

        .swagger-ui input[type=text],
        .swagger-ui textarea {
            background: var(--bg-tertiary) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
            border-radius: 8px !important;
            padding: 8px 12px !important;
        }

        .swagger-ui input[type=text]:focus,
        .swagger-ui textarea:focus {
            outline: none !important;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1) !important;
        }

        /* Buttons styling */
        .swagger-ui .btn {
            border-radius: 8px !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-secondary) !important;
            transition: all 0.2s ease !important;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important;
        }

        .swagger-ui .btn:hover {
            background-color: var(--bg-tertiary) !important;
            color: var(--text-primary) !important;
        }

        .swagger-ui .btn.execute {
            background-color: var(--accent-color) !important;
            border-color: var(--accent-color) !important;
            color: #ffffff !important;
        }

        .swagger-ui .btn.execute:hover {
            background-color: var(--accent-hover) !important;
            border-color: var(--accent-hover) !important;
        }

        .swagger-ui .btn.cancel {
            background-color: var(--danger-color) !important;
            border-color: var(--danger-color) !important;
            color: #ffffff !important;
        }

        .swagger-ui .btn-group .btn {
            border-radius: 8px !important;
        }

        .swagger-ui .authorization__btn_raw {
            fill: var(--accent-color) !important;
        }

        /* Response box & Code display */
        .swagger-ui .responses-wrapper {
            background: var(--bg-secondary) !important;
        }

        .swagger-ui .response-control-media-type__title {
            color: var(--text-secondary) !important;
        }

        .swagger-ui .model-box-control:focus {
            outline: none !important;
        }

        /* Keep Developer pre-code blocks readable and premium (Dark coding look) */
        .swagger-ui pre {
            background: #0f172a !important;
            border: 1px solid #1e293b !important;
            border-radius: 8px !important;
            padding: 15px !important;
            color: #38bdf8 !important;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06) !important;
        }

        .swagger-ui code {
            font-family: 'Courier New', Courier, monospace !important;
        }

        /* Models section at the bottom */
        .swagger-ui .models {
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            background: var(--bg-secondary) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
        }

        .swagger-ui .models h4 {
            border-bottom: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
        }

        .swagger-ui .model-container {
            background: var(--bg-primary) !important;
            border-radius: 8px !important;
            margin: 10px !important;
            border: 1px solid var(--border-color) !important;
        }

        .swagger-ui .model-title {
            color: var(--text-primary) !important;
        }

        .swagger-ui .model {
            color: var(--text-secondary) !important;
        }

        /* Hide Topbar of Swagger */
        .swagger-ui .topbar {
            display: none !important;
        }

        /* Scheme Select Container */
        .swagger-ui .scheme-container {
            background: var(--bg-secondary) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            margin: 20px 40px !important;
            padding: 20px !important;
        }

        .swagger-ui .schemes {
            align-items: center !important;
        }

        .swagger-ui .schemes>label {
            color: var(--text-secondary) !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
        }

        .swagger-ui .schemes select {
            background: var(--bg-tertiary) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-primary) !important;
            border-radius: 8px !important;
            padding: 8px 12px !important;
        }

        .swagger-ui .auth-wrapper .authorize {
            background-color: var(--accent-color) !important;
            border-color: var(--accent-color) !important;
            color: #ffffff !important;
            border-radius: 8px !important;
        }

        .swagger-ui .auth-wrapper .authorize:hover {
            background-color: var(--accent-hover) !important;
            border-color: var(--accent-hover) !important;
        }

        /* Modals and dialogs */
        .swagger-ui .dialog-ux .modal-ux {
            background-color: var(--bg-secondary) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 16px !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
        }

        .swagger-ui .dialog-ux .modal-ux-header h3 {
            color: var(--text-primary) !important;
            font-family: 'Outfit', sans-serif !important;
        }

        .swagger-ui .dialog-ux .modal-ux-content h4 {
            color: var(--text-secondary) !important;
        }

        /* Layout wrapper margins */
        .swagger-ui .wrapper {
            max-width: 1200px !important;
            padding: 0 40px !important;
        }
    </style>
</head>
<body>

    <!-- Glassmorphic Header -->
    <header class="api-header">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#4f46e5"/>
                <path d="M2 17L12 22L22 17" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            MindHub REST API
        </h1>
        <span class="badge">OpenAPI 3.0</span>
    </header>

    <!-- Swagger UI Mount Point -->
    <div id="swagger-ui"></div>

    <!-- Swagger UI Scripts -->
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            window.ui = SwaggerUIBundle({
                url: "openapi.yaml",
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "BaseLayout",
                persistAuthorization: true
            });
        };
    </script>
</body>
</html>
